name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows app
        run: npm run build

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: RomDesktopPet ${{ github.ref_name }}
          body: |
            RomDesktopPet Windows release.

            Download options:
            - Portable exe: no installer needed.
            - Setup exe: assisted Windows installer.

            If Windows blocks the app, choose "More info" and then "Run anyway".
          files: |
            dist/*Portable*.exe
            dist/*Setup*.exe
