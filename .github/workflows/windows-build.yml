name: Windows Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows app
        run: npm run build

      - name: Upload portable app
        uses: actions/upload-artifact@v4
        with:
          name: RomDesktopPet-portable
          path: dist/*Portable*.exe

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: RomDesktopPet-installer
          path: dist/*Setup*.exe
